server:
  port: ${PORT:5000}

spring:
  datasource:
    url: jdbc:mysql://${DB_ENDPOINT:localhost}:3306/${DB_NAME:taskflow_db}?allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Vbcd@123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:developervaibhav124@gmail.com}
    password: ${MAIL_PASSWORD:xgba iqyd jnhf hcxu}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

jwt:
  secret: ${JWT_SECRET:9d8f7a6b5c4e3d2f1a9b8c7d6e5f4a3b-VaibhavChougule}
  expiration: 86400000

file:
  upload-dir: ${UPLOAD_DIR:/app/uploads/}

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: INFO